name: Update Astrology Calendar
on:
  schedule:
    - cron: '0 0 * * 0' # Automatically runs every Sunday at midnight UTC
  workflow_dispatch: # Allows you to manually trigger it whenever you want

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives GitHub permission to save the generated calendar to your repository
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Libraries
        run: pip install -r requirements.txt
        
      - name: Run Calculations
        run: python generate_calendar.py
        
      - name: Save and Publish Calendar File
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add astrology.ics
          git commit -m "Automated calendar refresh" || exit 0
          git push
